<script type="module">
import { app } from "/js/firebase.js";
import { 
  getFirestore, doc, getDoc, updateDoc 
} from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";

import { showLoadingSpinner, removeLoadingSpinner } from "/js/Spinner.js";
import { showMessage } from "/js/uiMessage.js";

const db = getFirestore(app);

export async function loadTrainingInformation() {
  const ref = doc(db, "training_information", "jeugd");

  try {
    const snapshot = await getDoc(ref);

    if (!snapshot.exists()) {
      console.warn("No existing training info found.");
      return;
    }

    const data = snapshot.data();

    document.getElementById("event-number-of-training-moments").value = data.numberOfTrainingMoments || "";
    document.getElementById("event-price").value = data.price || "";
    document.getElementById("event-registration-link").value = data.registrationLink || "";

    document.getElementById("event-registration-start").value = data.registrationStart || "";
    document.getElementById("event-registration-end").value = data.registrationEnd || "";
    document.getElementById("event-planning-proposal").value = data.planningProposal || "";

    document.getElementById("event-start-trainings").value = data.startTrainings || "";
    document.getElementById("event-end-trainings").value = data.endTrainings || "";

    if (data.location) {
      const radio = document.querySelector(`input[name="location"][value="${data.location}"]`);
      if (radio) radio.checked = true;
    }

    if (Array.isArray(data.trainingDays)) {
      data.trainingDays.forEach(day => {
        const checkbox = document.querySelector(`.training-day-tennis[value="${day}"]`);
        if (checkbox) checkbox.checked = true;
      });
    }
     if (Array.isArray(data.conditioningDays)) {
      data.conditioningDays.forEach(day => {
        const checkbox = document.querySelector(`.training-day-conditie[value="${day}"]`);
        if (checkbox) checkbox.checked = true;
      });
    }

  } catch (err) {
    console.error("Error loading training info:", err);
  }
}

export async function saveTrainingInformation() {
  const spinnerHolder = document.getElementById("holder-spinner-save-changes");
  const spinner = showLoadingSpinner(spinnerHolder);

  const ref = doc(db, "training_information", "jeugd");

  const location = document.querySelector("input[name='location']:checked")?.value || "";
  const trainingDays = [...document.querySelectorAll(".training-day-tennis:checked")].map(d => d.value);
  const conditioningDays = [...document.querySelectorAll(".training-day-conditie:checked")].map(d => d.value);


  const numberOfTrainingMoments = document.getElementById("event-number-of-training-moments").value.trim();
  const price = document.getElementById("event-price").value.trim();
  const registrationLink = document.getElementById("event-registration-link").value.trim();

  const registrationStart = document.getElementById("event-registration-start").value.trim();
  const registrationEnd = document.getElementById("event-registration-end").value.trim();
  const planningProposal = document.getElementById("event-planning-proposal").value.trim();

  const startTrainings = document.getElementById("event-start-trainings").value.trim();
  const endTrainings = document.getElementById("event-end-trainings").value.trim();

  try {
    await updateDoc(ref, {
      location,
      trainingDays,
      conditioningDays,
      numberOfTrainingMoments,
      price,
      registrationLink,
      registrationStart,
      registrationEnd,
      planningProposal,
      startTrainings,
      endTrainings
    });

    showMessage("Training informatie bijgewerkt!", "success");
  } catch (err) {
    console.error("Error saving training info:", err);
    showMessage("Er ging iets mis bij het opslaan.", "error");
  }

  removeLoadingSpinner(spinnerHolder);
}

document.addEventListener("DOMContentLoaded", () => {
  loadTrainingInformation();

  document.getElementById("save-event-btn").addEventListener("click", () => {
    saveTrainingInformation();
  });

  document.getElementById("copy-from-kids-btn").addEventListener("click", copyFromKids);

});

async function copyFromKids() {
  const kidsRef = doc(db, "training_information", "kids");

  try {
    const snapshot = await getDoc(kidsRef);

    if (!snapshot.exists()) {
      showMessage("Kids data niet gevonden.", "error");
      return;
    }

    const data = snapshot.data();

    // Simple text fields
    const map = {
      numberOfTrainingMoments: "event-number-of-training-moments",
      price: "event-price",
      registrationLink: "event-registration-link",
      registrationStart: "event-registration-start",
      registrationEnd: "event-registration-end",
      planningProposal: "event-planning-proposal",
      startTrainings: "event-start-trainings",
      endTrainings: "event-end-trainings"
    };

    Object.entries(map).forEach(([key, id]) => {
      if (data[key] !== undefined) {
        document.getElementById(id).value = data[key];
      }
    });

    // Location
    if (data.location) {
      const radio = document.querySelector(`input[name="location"][value="${data.location}"]`);
      if (radio) radio.checked = true;
    }

    // Tennis days
    if (Array.isArray(data.trainingDays)) {
      document.querySelectorAll(".training-day-tennis").forEach(cb => cb.checked = false);
      data.trainingDays.forEach(day => {
        const cb = document.querySelector(`.training-day-tennis[value="${day}"]`);
        if (cb) cb.checked = true;
      });
    }

    // Conditie days
    if (Array.isArray(data.conditioningDays)) {
      document.querySelectorAll(".training-day-conditie").forEach(cb => cb.checked = false);
      data.conditioningDays.forEach(day => {
        const cb = document.querySelector(`.training-day-conditie[value="${day}"]`);
        if (cb) cb.checked = true;
      });
    }

    showMessage("Gegevens van Kids gekopieerd! Vergeet de info niet op te slagen", "success");

  } catch (err) {
    console.error("Error copying from kids:", err);
    showMessage("Kon Kids gegevens niet laden.", "error");
  }
}

</script>
