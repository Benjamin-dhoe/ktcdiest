<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Adminpaneel</title>
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <link href="/css/normalize.css" rel="stylesheet" type="text/css">
  <link href="/css/webflow.css" rel="stylesheet" type="text/css">
  <link href="/css/ktc-diest.css" rel="stylesheet" type="text/css">
  <link href="/css/dashboard.css" rel="stylesheet" type="text/css">
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link
    href="https://fonts.gstatic.com"
    rel="preconnect"
    crossorigin="anonymous"
  />
  <script
    src="https://ajax.googleapis.com/ajax/libs/webfont/1.6.26/webfont.js"
    type="text/javascript"
  ></script>
  <script type="text/javascript">
    WebFont.load({ google: { families: ["Poppins:300,400,500,600,700"] } });
  </script>
  <script
    src="https://use.typekit.net/sxk2qjh.js"
    type="text/javascript"
  ></script>
  <script type="text/javascript">
    try {
      Typekit.load();
    } catch (e) {}
  </script>
  <script type="text/javascript">
    !(function (o, c) {
      var n = c.documentElement,
        t = " w-mod-";
      (n.className += t + "js"),
        ("ontouchstart" in o ||
          (o.DocumentTouch && c instanceof DocumentTouch)) &&
          (n.className += t + "touch");
    })(window, document);
  </script>
  <link href="/images/favicon.png" rel="shortcut icon" type="image/x-icon" />
  <link href="/images/webclip.png" rel="apple-touch-icon" />
  <script src="https://unpkg.com/@lottiefiles/lottie-player@1.5.7/dist/lottie-player.js"></script>
</head>
<body class="body-dashboard">
  <div class="popup" id="fullpage-loading-popup" style="z-index: 9999">
    <div class="alwaysflexhorizontal" style="gap: 12px">
      <lottie-player src="/images/loading.json" background="transparent" speed="1" loop="" autoplay="" style="width: 200px"></lottie-player>
      <div class="smalltext" id="loading-text"></div>
    </div>
  </div>
  <div class="holder-content">
    {{admintopdashboard}}
    <div class="tabs">
      {{adminmenu}}
      <div class="tabs-content-dashboard">

      <div class="top-of-the-pane-dashboard">
        <h2 class="heading-dashboard">Inschrijvingen</h2>
      </div>

      <div class="registrations-filter-bar">
        <select id="event-filter" class="admin-select">
          <option value="">Selecteer een event</option>
        </select>
      </div>

      <div class="registrations-table-wrapper" id="table-wrapper" style="display:none;">
        <div class="registrations-scroll">
          <table class="registrations-table">
            <thead>
              <tr id="registrations-head"></tr>
            </thead>
            <tbody id="registrations-body"></tbody>
          </table>
        </div>
      </div>

    </div>
    </div>
  </div>
<script src="/js/dash.js" type="module"></script>
<script type="module">
import { app } from "/js/firebase.js";
import {
  getFirestore,
  collection,
  getDocs,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";

const db = getFirestore(app);

const registrationsBody = document.getElementById("registrations-body");
const registrationsHead = document.getElementById("registrations-head");
const eventFilter = document.getElementById("event-filter");
const tableWrapper = document.getElementById("table-wrapper");

let registrations = [];
let events = [];

/* -------------------------
   LOAD EVENTS (NO "ALL")
-------------------------- */
async function loadEvents() {
  const snap = await getDocs(collection(db, "events"));

  eventFilter.innerHTML = `<option value="">Selecteer een event</option>`;

  snap.forEach(doc => {
    const e = doc.data();
    events.push({ id: doc.id, ...e });

    const opt = document.createElement("option");
    opt.value = doc.id;
    opt.textContent = e.title || doc.id;
    eventFilter.appendChild(opt);
  });
}

/* -------------------------
   LOAD REGISTRATIONS
-------------------------- */
async function loadRegistrations() {
  const q = query(
    collection(db, "event_registrations"),
    orderBy("createdAt", "desc")
  );

  const snap = await getDocs(q);

  registrations = snap.docs.map(d => ({
    id: d.id,
    ...d.data()
  }));
}

/* -------------------------
   EVENT CHANGE
-------------------------- */
eventFilter.addEventListener("change", () => {
  const eventId = eventFilter.value;

  // hide if nothing selected
  if (!eventId) {
    tableWrapper.style.display = "none";
    registrationsBody.innerHTML = "";
    registrationsHead.innerHTML = "";
    return;
  }

  tableWrapper.style.display = "block";
  renderTable(eventId);
});

/* -------------------------
   RENDER TABLE
-------------------------- */
function renderTable(eventId) {
  const filtered = registrations.filter(r => r.eventId === eventId);

  if (!filtered.length) {
    registrationsHead.innerHTML = "";
    registrationsBody.innerHTML =
      `<tr><td colspan="100%">Geen inschrijvingen</td></tr>`;
    return;
  }

  const event = events.find(e => e.id === eventId);
  const hasPayment = event?.paymentEnabled === true;

  // Base columns
  const labelSet = new Set(["name", "email"]);

  // Always show priceOption + price when payment exists
  if (hasPayment) {
    labelSet.add("priceOption");
    labelSet.add("price");
    labelSet.add("paymentStatus");
  }

  // Add dynamic form fields
  filtered.forEach(r => {
    (r.answers || []).forEach(a => {
      if (a.label) labelSet.add(a.label);
    });
  });

  const headers = Array.from(labelSet);

  /* -------------------------
     HEADER
  -------------------------- */
  registrationsHead.innerHTML = headers
    .map(h => `<th>${h}</th>`)
    .join("");

  /* -------------------------
     BODY
  -------------------------- */
  registrationsBody.innerHTML = filtered
    .map(r => {
      const row = headers
        .map(h => {

          if (h === "name") return `<td>${r.name || ""}</td>`;
          if (h === "email") return `<td>${r.email || ""}</td>`;

          if (h === "priceOption") {
            return `<td>${r.priceOption || "-"}</td>`;
          }

          if (h === "price") {
            return `<td><strong>€${Number(r.price || 0).toFixed(2)}</strong></td>`;
          }

          if (h === "paymentStatus") {
            return `
              <td>
                <span class="status-badge status-${r.paymentStatus || "pending"}">
                  ${r.paymentStatus || "pending"}
                </span>
              </td>
            `;
          }

          const answer = (r.answers || []).find(a => a.label === h);
          return `<td>${answer ? answer.value : ""}</td>`;
        })
        .join("");

      return `<tr>${row}</tr>`;
    })
    .join("");
}

/* -------------------------
   INIT
-------------------------- */
(async function init() {
  tableWrapper.style.display = "none";
  await loadEvents();
  await loadRegistrations();
})();
</script>
</body>
</html>
