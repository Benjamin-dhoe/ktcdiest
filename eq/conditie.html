                <label><input type="checkbox" class="age-u17-conditie" value="Zaterdag"> Zaterdag</label>
                <label><input type="checkbox" class="age-u17-conditie" value="Zondag"> Zondag</label>
              </div>
            </div>
          </div>

          <!-- SAVE BUTTON -->
          <div class="popup-actions">
            <button id="save-event-btn" class="primary-btn">Opslaan</button>
            <div id="holder-spinner-save-changes"></div>
          </div>
        </div>
        </div>
      </div>
      
<script src="/js/dash.js" type="module"></script>
<script type="module">
import { app } from "/js/firebase.js";
import {
  getFirestore, doc, getDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";

import { showLoadingSpinner, removeLoadingSpinner } from "/js/Spinner.js";
import { showMessage } from "/js/uiMessage.js";

const db = getFirestore(app);
const CONDITIE_REF = doc(db, "training_information", "conditie");

/* ---------------------------------------------------
   AGE GROUPS CONFIG
--------------------------------------------------- */
const AGE_GROUPS = ["kids", "u9", "u11", "u13", "u15", "u17"];

/* ---------------------------------------------------
   LOAD ALL DATA
--------------------------------------------------- */
async function loadConditie() {
  try {
    const snapshot = await getDoc(CONDITIE_REF);
    if (!snapshot.exists()) {
      console.warn("Conditie doc not found");
      return;
    }

    const data = snapshot.data();

    /* -------------------------
       LOAD SHARED FIELDS
    ------------------------- */
    document.getElementById("shared-registration-start").value = data.registrationStart || "";
    document.getElementById("shared-registration-end").value = data.registrationEnd || "";
    document.getElementById("shared-planning-proposal").value = data.planningProposal || "";
    document.getElementById("shared-start-trainings").value = data.startTrainings || "";
    document.getElementById("shared-end-trainings").value = data.endTrainings || "";
    document.getElementById("shared-registration-visible-until").value = data.registrationVisibleUntil || "";

    if (data.location) {
      const radio = document.querySelector(`input[name="location"][value="${data.location}"]`);
      if (radio) radio.checked = true;
    }

    /* -------------------------
       LOAD AGE-SPECIFIC FIELDS
    ------------------------- */
    AGE_GROUPS.forEach(age => {
      const ageData = data[age] || {};

      document.getElementById(`age-${age}-number`).value = ageData.numberOfTrainingMoments || "";
      document.getElementById(`age-${age}-price`).value = ageData.price || "";
      document.getElementById(`age-${age}-link`).value = ageData.registrationLink || "";

      // Conditie
      document.querySelectorAll(`.age-${age}-conditie`).forEach(cb => cb.checked = false);
      if (Array.isArray(ageData.trainingDaysConditie)) {
        ageData.trainingDaysConditie.forEach(day => {
          const cb = document.querySelector(`.age-${age}-conditie[value="${day}"]`);
          if (cb) cb.checked = true;
        });
      }
    });

  } catch (err) {
    console.error("Error loading conditie data:", err);
  }
}

/* ---------------------------------------------------
   SAVE ALL DATA
--------------------------------------------------- */
async function saveConditie() {
  const spinnerHolder = document.getElementById("holder-spinner-save-changes");
  const spinner = showLoadingSpinner(spinnerHolder);

  /* -------------------------
     SHARED FIELDS
  ------------------------- */
  const shared = {
    location: document.querySelector("input[name='location']:checked")?.value || "",
    registrationStart: document.getElementById("shared-registration-start").value.trim(),
    registrationEnd: document.getElementById("shared-registration-end").value.trim(),
    planningProposal: document.getElementById("shared-planning-proposal").value.trim(),
    startTrainings: document.getElementById("shared-start-trainings").value.trim(),
    endTrainings: document.getElementById("shared-end-trainings").value.trim(),
    registrationVisibleUntil: document.getElementById("shared-registration-visible-until").value
  };

  /* -------------------------
     AGE-SPECIFIC FIELDS
  ------------------------- */
  const agePayload = {};

  AGE_GROUPS.forEach(age => {
    agePayload[age] = {
      numberOfTrainingMoments: document.getElementById(`age-${age}-number`).value.trim(),
      price: document.getElementById(`age-${age}-price`).value.trim(),
      registrationLink: document.getElementById(`age-${age}-link`).value.trim(),
      trainingDaysConditie: [...document.querySelectorAll(`.age-${age}-conditie:checked`)].map(cb => cb.value)
    };
  });

  try {
    await updateDoc(CONDITIE_REF, {
      ...shared,
      ...agePayload
    });

    showMessage("Conditie informatie opgeslagen!", "success");

  } catch (err) {
    console.error("Error saving conditie data:", err);
    showMessage("Opslaan mislukt.", "error");
  }

  removeLoadingSpinner(spinnerHolder);
}

/* ---------------------------------------------------
   COPY SHARED FIELDS FROM KIDS
--------------------------------------------------- */
async function copySharedFromKids() {
  try {
    const kidsRef = doc(db, "training_information", "kids");
    const snapshot = await getDoc(kidsRef);

    if (!snapshot.exists()) {
      showMessage("Kids doc niet gevonden.", "error");
      return;
    }

    const data = snapshot.data();

    // Copy shared fields if they exist on kids
    if (data.registrationStart !== undefined) {
      document.getElementById("shared-registration-start").value = data.registrationStart;
    }
    if (data.registrationEnd !== undefined) {
      document.getElementById("shared-registration-end").value = data.registrationEnd;
    }
    if (data.planningProposal !== undefined) {
      document.getElementById("shared-planning-proposal").value = data.planningProposal;
    }
    if (data.startTrainings !== undefined) {
      document.getElementById("shared-start-trainings").value = data.startTrainings;
    }
    if (data.endTrainings !== undefined) {
      document.getElementById("shared-end-trainings").value = data.endTrainings;
    }
    if (data.registrationVisibleUntil !== undefined) {
      document.getElementById("shared-registration-visible-until").value = data.registrationVisibleUntil;
    }

    // Location
    if (data.location) {
      const radio = document.querySelector(`input[name="location"][value="${data.location}"]`);
      if (radio) radio.checked = true;
    }

    showMessage("Gedeelde gegevens van Kids gekopieerd! Vergeet niet op te slaan.", "success");

  } catch (err) {
    console.error("Error copying shared fields from kids:", err);
    showMessage("Kon Kids gedeelde data niet laden.", "error");
  }
}

/* ---------------------------------------------------
   INIT
--------------------------------------------------- */
document.addEventListener("DOMContentLoaded", () => {
  loadConditie();

  document.getElementById("save-event-btn").addEventListener("click", saveConditie);
  document.getElementById("copy-from-kids-btn").addEventListener("click", copySharedFromKids);
});
</script>

</body></html>
