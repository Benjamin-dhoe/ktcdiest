<script src="/js/dash.js" type="text/javascript"></script>
<script type="module">
import { app } from "/js/firebase.js";
import { slugify } from "/js/utility.js";
import {
  getFirestore, collection, getDocs, getDoc, addDoc, updateDoc, doc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";
import {
  getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.13.1/firebase-storage.js";

const db = getFirestore(app);
const storage = getStorage(app);

const listHolder = document.getElementById("holdercoaches");
const popup = document.getElementById("coach-popup");

const popupTitle = document.getElementById("popup-title");
const nameInput = document.getElementById("coach-name");
const introInput = document.getElementById("coach-intro");
const mainImageInput = document.getElementById("coach-main-image");
const mainImagePreview = document.getElementById("coach-main-image-preview");

const achievementsList = document.getElementById("achievements-list");
const addAchievementBtn = document.getElementById("add-achievement-btn");

const additionalImagesContainer = document.getElementById("additional-images-container");
const addAdditionalImageBtn = document.getElementById("add-additional-image-btn");
const additionalImageUpload = document.getElementById("additional-image-upload");

const saveBtn = document.getElementById("save-coach-btn");

let popupMode = "add"; // "add" or "edit"
let currentCoachId = null;
let additionalImages = []; // URLs
let removedImages = []; // URLs to delete

// -------------------------------
// Helper: Add achievement input
// -------------------------------
function addAchievement(value = "") {
  const div = document.createElement("div");
  div.className = "achievement-item";
  div.innerHTML = `
    <input type="text" value="${value.replace(/"/g, "&quot;")}" placeholder="Achievement">
    <button class="remove-ach-btn" type="button">X</button>
  `;
  div.querySelector(".remove-ach-btn").onclick = () => div.remove();
  achievementsList.appendChild(div);
}

// -------------------------------
// Helper: Add additional image preview
// -------------------------------
function addAdditionalImage(url, isExisting = false) {
  const wrapper = document.createElement("div");
  wrapper.className = "additional-image-item";

  wrapper.innerHTML = `
    <img src="${url}" class="preview-img-small">
    <button class="remove-additional-img-btn">X</button>
  `;

  wrapper.querySelector(".remove-additional-img-btn").onclick = () => {
    if (isExisting) removedImages.push(url);
    additionalImages = additionalImages.filter(img => img !== url);
    wrapper.remove();
  };

  additionalImagesContainer.appendChild(wrapper);
}

// -------------------------------
// Load coaches
// -------------------------------
async function loadCoaches() {
  const querySnapshot = await getDocs(collection(db, "coaches"));
  listHolder.innerHTML = "";

  querySnapshot.forEach((docSnap) => {
    const data = docSnap.data();
    const id = docSnap.id;

    const item = document.createElement("div");
    item.className = "collection-items-basic flex-hor-spaced";
    item.innerHTML = `
      <div class="flexhorizontal" style="gap: 12px">
        <div class="coachhold">
          <img loading="lazy" width="40" src="${data.imageUrl || "/images/placeholder.jpg"}">
        </div>
        <div class="bold-text">${data.name}</div>
      </div>
      <div class="holderactionbtns">
        <button class="actionbtn edit-btn" data-id="${id}"><img src="/images/edit.svg"></button>
        <button class="actionbtn delete-btn" data-id="${id}"><img src="/images/delete.svg"></button>
      </div>
    `;
    listHolder.appendChild(item);
  });

  document.querySelectorAll(".edit-btn").forEach(btn =>
    btn.onclick = openEditPopup
  );

  document.querySelectorAll(".delete-btn").forEach(btn =>
    btn.onclick = openDeleteModal
  );
}

// -------------------------------
// Open popup in ADD mode
// -------------------------------
document.getElementById("add-coach-btn").onclick = () => {
  popupMode = "add";
  currentCoachId = null;

  popupTitle.textContent = "Coach toevoegen";

  nameInput.value = "";
  introInput.value = "";
  mainImageInput.value = "";
  mainImagePreview.style.display = "none";

  achievementsList.innerHTML = "";
  additionalImagesContainer.innerHTML = "";
  additionalImages = [];
  removedImages = [];

  popup.style.display = "flex";
};

// -------------------------------
// Open popup in EDIT mode
// -------------------------------
async function openEditPopup(e) {
  popupMode = "edit";
  currentCoachId = e.target.closest("button").dataset.id;

  popupTitle.textContent = "Coach bewerken";

  const refDoc = doc(db, "coaches", currentCoachId);
  const snap = await getDoc(refDoc);

  if (!snap.exists()) return;

  const data = snap.data();

  nameInput.value = data.name || "";
  introInput.value = data.intro || "";

  // Main image
  if (data.imageUrl) {
    mainImagePreview.src = data.imageUrl;
    mainImagePreview.style.display = "block";
  }

  // Achievements
  achievementsList.innerHTML = "";
  (data.achievements || []).forEach(a => addAchievement(a));

  // Additional images
  additionalImagesContainer.innerHTML = "";
  additionalImages = [...(data.additionalImages || [])];
  removedImages = [];

  additionalImages.forEach(url => addAdditionalImage(url, true));

  popup.style.display = "flex";
}

// -------------------------------
// Upload helper
// -------------------------------
async function uploadImage(file, path) {
  const storageRef = ref(storage, path);
  await uploadBytes(storageRef, file);
  return await getDownloadURL(storageRef);
}

// -------------------------------
// Save coach (add or edit)
// -------------------------------
saveBtn.onclick = async () => {
  const name = nameInput.value.trim();
  const intro = introInput.value.trim();

  const achievements = Array.from(
    achievementsList.querySelectorAll("input")
  )
    .map(i => i.value.trim())
    .filter(v => v.length > 0);

  let mainImageUrl = null;

  if (mainImageInput.files[0]) {
    mainImageUrl = await uploadImage(
      mainImageInput.files[0],
      `coaches/main_${Date.now()}_${mainImageInput.files[0].name}`
    );
  }

  // Upload new additional images
  const newUploads = [];
  for (const file of additionalImageUpload.files) {
    const url = await uploadImage(
      file,
      `coaches/additional_${Date.now()}_${file.name}`
    );
    newUploads.push(url);
  }

  const finalAdditionalImages = [
    ...additionalImages,
    ...newUploads
  ].filter(url => !removedImages.includes(url));

  const payload = {
    name,
    slug: slugify(name),
    intro,
    achievements,
    additionalImages: finalAdditionalImages
  };

  if (mainImageUrl) payload.imageUrl = mainImageUrl;

  if (popupMode === "add") {
    await addDoc(collection(db, "coaches"), payload);
  } else {
    await updateDoc(doc(db, "coaches", currentCoachId), payload);
  }

  popup.style.display = "none";
  loadCoaches();
};

addAdditionalImageBtn.onclick = () => additionalImageUpload.click();

additionalImageUpload.onchange = async () => {
  const file = additionalImageUpload.files[0];
  if (!file) return;

  const url = URL.createObjectURL(file);
  addAdditionalImage(url, false);
};

function openDeleteModal(e) {
  const id = e.target.closest("button").dataset.id;
  if (confirm("Coach verwijderen?")) {
    deleteDoc(doc(db, "coaches", id)).then(loadCoaches);
  }
}

document.getElementById("closePopupBtn").onclick =
document.getElementById("closePopupBtnTop").onclick =
  () => popup.style.display = "none";

loadCoaches();

</script>

</body></html>
