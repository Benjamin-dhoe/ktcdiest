<script type="module">
import { app } from "/js/firebase.js";
import { 
  getFirestore, doc, getDoc, updateDoc 
} from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";

import { showLoadingSpinner, removeLoadingSpinner } from "/js/Spinner.js";
import { showMessage } from "/js/uiMessage.js";

const db = getFirestore(app);
const COMPETITIE_REF = doc(db, "training_information", "competitie");

/* ---------------------------------------------------
   GET SELECTED AGE GROUP
--------------------------------------------------- */
function getAgeCategory() {
  return document.getElementById("age-category").value;
}

/* ---------------------------------------------------
   LOAD DATA
--------------------------------------------------- */
export async function loadTrainingInformation() {
  try {
    const snapshot = await getDoc(COMPETITIE_REF);

    if (!snapshot.exists()) {
      console.warn("Competitie doc not found");
      return;
    }

    const data = snapshot.data();

    /* -------------------------
       LOAD SHARED FIELDS
    ------------------------- */
    document.getElementById("shared-registration-start").value = data.registrationStart || "";
    document.getElementById("shared-registration-end").value = data.registrationEnd || "";
    document.getElementById("shared-planning-proposal").value = data.planningProposal || "";
    document.getElementById("shared-start-trainings").value = data.startTrainings || "";
    document.getElementById("shared-end-trainings").value = data.endTrainings || "";

    if (data.location) {
      const radio = document.querySelector(`input[name="location"][value="${data.location}"]`);
      if (radio) radio.checked = true;
    }

    /* -------------------------
       LOAD AGE-SPECIFIC FIELDS
    ------------------------- */
    const age = getAgeCategory();
    const ageData = data[age] || {};

    document.getElementById("age-number-of-training-moments").value = ageData.numberOfTrainingMoments || "";
    document.getElementById("age-price").value = ageData.price || "";
    document.getElementById("age-registration-link").value = ageData.registrationLink || "";

    // Tennis
    document.querySelectorAll(".age-tennis").forEach(cb => cb.checked = false);
    if (Array.isArray(ageData.trainingDaysTennis)) {
      ageData.trainingDaysTennis.forEach(day => {
        const cb = document.querySelector(`.age-tennis[value="${day}"]`);
        if (cb) cb.checked = true;
      });
    }

    // Conditie
    document.querySelectorAll(".age-conditie").forEach(cb => cb.checked = false);
    if (Array.isArray(ageData.trainingDaysConditie)) {
      ageData.trainingDaysConditie.forEach(day => {
        const cb = document.querySelector(`.age-conditie[value="${day}"]`);
        if (cb) cb.checked = true;
      });
    }

  } catch (err) {
    console.error("Error loading competitie data:", err);
  }
}

/* ---------------------------------------------------
   SAVE DATA
--------------------------------------------------- */
export async function saveTrainingInformation() {
  const spinnerHolder = document.getElementById("holder-spinner-save-changes");
  const spinner = showLoadingSpinner(spinnerHolder);

  const age = getAgeCategory();

  // Shared fields
  const shared = {
    location: document.querySelector("input[name='location']:checked")?.value || "",
    registrationStart: document.getElementById("shared-registration-start").value.trim(),
    registrationEnd: document.getElementById("shared-registration-end").value.trim(),
    planningProposal: document.getElementById("shared-planning-proposal").value.trim(),
    startTrainings: document.getElementById("shared-start-trainings").value.trim(),
    endTrainings: document.getElementById("shared-end-trainings").value.trim()
  };

  // Age-specific fields
  const ageSpecific = {
    numberOfTrainingMoments: document.getElementById("age-number-of-training-moments").value.trim(),
    price: document.getElementById("age-price").value.trim(),
    registrationLink: document.getElementById("age-registration-link").value.trim(),
    trainingDaysTennis: [...document.querySelectorAll(".age-tennis:checked")].map(cb => cb.value),
    trainingDaysConditie: [...document.querySelectorAll(".age-conditie:checked")].map(cb => cb.value)
  };

  try {
    await updateDoc(COMPETITIE_REF, {
      ...shared,
      [age]: ageSpecific
    });

    showMessage("Competitie informatie opgeslagen!", "success");

  } catch (err) {
    console.error("Error saving competitie data:", err);
    showMessage("Opslaan mislukt.", "error");
  }

  removeLoadingSpinner(spinnerHolder);
}

/* ---------------------------------------------------
   COPY SHARED FIELDS FROM KIDS
--------------------------------------------------- */
async function copyFromKids() {
  try {
    const snapshot = await getDoc(COMPETITIE_REF);

    if (!snapshot.exists()) {
      showMessage("Competitie doc niet gevonden.", "error");
      return;
    }

    const data = snapshot.data();
    const kids = data.kids;

    if (!kids) {
      showMessage("Kids data niet gevonden.", "error");
      return;
    }

    // Copy only shared fields
    const sharedFields = [
      "registrationStart",
      "registrationEnd",
      "planningProposal",
      "startTrainings",
      "endTrainings",
      "location"
    ];

    sharedFields.forEach(field => {
      if (data[field] !== undefined) {
        const el = document.getElementById(`shared-${field.replace(/([A-Z])/g, "-$1").toLowerCase()}`);
        if (el) el.value = data[field];
      }
    });

    // Location radio
    if (data.location) {
      const radio = document.querySelector(`input[name="location"][value="${data.location}"]`);
      if (radio) radio.checked = true;
    }

    showMessage("Gedeelde gegevens van Kids gekopieerd!", "success");

  } catch (err) {
    console.error("Error copying shared fields:", err);
    showMessage("Kon Kids gedeelde data niet laden.", "error");
  }
}

/* ---------------------------------------------------
   INIT
--------------------------------------------------- */
document.addEventListener("DOMContentLoaded", () => {
  loadTrainingInformation();

  document.getElementById("age-category").addEventListener("change", loadTrainingInformation);
  document.getElementById("save-event-btn").addEventListener("click", saveTrainingInformation);
  document.getElementById("copy-from-kids-btn").addEventListener("click", copyFromKids);
});

</script>
