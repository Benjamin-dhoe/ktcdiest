<!-- EVENT POPUP -->
<div id="event-popup" class="popup">
  <div class="popup-content">
    <button class="popup-close-btn" id="closeEventBtnTop">✕</button>

    <div class="innerpopup">
      <h2 id="event-popup-title">Nieuw Event</h2>

      <label>Titel</label>
      <input type="text" id="event-title">

      <label>Intro</label>
      <textarea id="event-intro"></textarea>

      <label>Hoofdafbeelding</label>
      <img id="event-current-main-image" style="width:80px; display:none;">
      <input type="file" id="event-main-image">

      <label>Extra afbeeldingen</label>
      <div id="event-existing-extra-images"></div>
      <input type="file" id="event-extra-images" multiple>

      <h3>Inschrijfmethode</h3>
      <label><input type="radio" name="inscription-method" value="form"> Formulier</label>
      <label><input type="radio" name="inscription-method" value="external"> Externe link</label>

      <div id="external-link-section" style="display:none;">
        <label>Externe link</label>
        <input type="text" id="event-external-link">
      </div>

      <div id="form-section" style="display:none;">
        <label><input type="checkbox" id="event-payment-enabled"> Betaling via website</label>

        <div id="payment-options-section" style="display:none;">
          <h3>Prijsopties</h3>
          <button id="add-price-option-btn" type="button">+</button>
          <div id="event-price-options"></div>
        </div>

        <h3>Formulier velden</h3>
        <button id="add-form-field-btn" type="button">+</button>
        <div id="event-form-fields"></div>

      <div id="event-extra-info"></div>

      <h3>Datum</h3>
      <label>Startdatum</label>
      <input type="date" id="event-start-date">

      <label>Einddatum (optioneel)</label>
      <input type="date" id="event-end-date">

      <div class="popup-actions">
        <button id="save-event-btn" class="primary-btn">Opslaan</button>
        <button id="closeEventBtn" class="close-btn">Sluiten</button>
      </div>
    </div>
  </div>
</div>

    <button id="delete-event-confirm" class="danger-btn">Verwijderen</button>
    <button id="close-delete-event-modal" class="close-btn">Annuleren</button>
  </div>
</div>

<script src="/js/dash.js" type="text/javascript"></script>
<script type="module">
  import { app } from "/js/firebase.js";
  import { 
    getFirestore, collection, getDocs, getDoc, addDoc, updateDoc, doc, deleteDoc 
  } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";
  import { 
    getStorage, ref, uploadBytes, getDownloadURL 
  } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-storage.js";

  const db = getFirestore(app);
  const storage = getStorage(app);

  const eventsCol = collection(db, "events");

  const listHolder = document.getElementById("holder-events");

  const eventPopup = document.getElementById("event-popup");
  const popupTitle = document.getElementById("event-popup-title");

  const titleInput = document.getElementById("event-title");
  const introInput = document.getElementById("event-intro");
  const mainImageInput = document.getElementById("event-main-image");
  const currentMainImage = document.getElementById("event-current-main-image");
  const extraImagesInput = document.getElementById("event-extra-images");
  const existingExtraImages = document.getElementById("event-existing-extra-images");

  const inscriptionRadios = document.querySelectorAll("input[name='inscription-method']");
  const externalLinkSection = document.getElementById("external-link-section");
  const externalLinkInput = document.getElementById("event-external-link");

  const formSection = document.getElementById("form-section");
  const paymentEnabledCheckbox = document.getElementById("event-payment-enabled");
  const paymentOptionsSection = document.getElementById("payment-options-section");
  const priceOptionsContainer = document.getElementById("event-price-options");
  const addPriceOptionBtn = document.getElementById("add-price-option-btn");

  const formFieldsContainer = document.getElementById("event-form-fields");
  const addFormFieldBtn = document.getElementById("add-form-field-btn");

  const extraInfoContainer = document.getElementById("event-extra-info");
  const addExtraInfoBtn = document.getElementById("add-extra-info-btn");

  const startDateInput = document.getElementById("event-start-date");
  const endDateInput = document.getElementById("event-end-date");

  const saveEventBtn = document.getElementById("save-event-btn");
  const closeEventBtn = document.getElementById("closeEventBtn");
  const closeEventBtnTop = document.getElementById("closeEventBtnTop");

  const addEventBtn = document.getElementById("add-event-btn");

  const deleteEventModal = document.getElementById("delete-event-modal");
  const deleteEventConfirmBtn = document.getElementById("delete-event-confirm");
  const closeDeleteEventModalBtn = document.getElementById("close-delete-event-modal");

  let currentEventId = null;
  let currentDeleteEventId = null;

  // ---------- Helpers ----------

  async function uploadImage(file, folder = "events") {
    const MAX_FILE_SIZE = 1048576; // 1MB
    if (!file) return null;
    if (file.size > MAX_FILE_SIZE) return null;

    const storageRef = ref(storage, `${folder}/${Date.now()}-${file.name}`);
    await uploadBytes(storageRef, file);
    return await getDownloadURL(storageRef);
  }

  function addDynamicItem(containerId, html) {
    const container = document.getElementById(containerId);
    const div = document.createElement("div");
    div.className = "dynamic-item";
    div.innerHTML = html;
    container.appendChild(div);

    const removeBtn = div.querySelector(".remove-btn");
    if (removeBtn) {
      removeBtn.addEventListener("click", () => div.remove());
    }
  }

  function priceTemplate(item = { label: "", price: "" }) {
    return `
      <input class="price-label" type="text" placeholder="Omschrijving" value="${item.label || ""}">
      <input class="price-value" type="text" placeholder="Prijs" value="${item.price || ""}">
      <button class="remove-btn" type="button">X</button>
    `;
  }

  function fieldTemplate(item = { label: "", type: "text" }) {
    return `
      <input class="field-label" type="text" placeholder="Veldlabel" value="${item.label || ""}">
      <select class="field-type">
        <option value="text" ${item.type === "text" ? "selected" : ""}>Tekst</option>
        <option value="checkbox" ${item.type === "checkbox" ? "selected" : ""}>Checkbox</option>
        <option value="radio" ${item.type === "radio" ? "selected" : ""}>Radio</option>
      </select>
      <button class="remove-btn" type="button">X</button>
    `;
  }

  function infoTemplate(item = { title: "", text: "" }) {
    return `
      <input class="info-title" type="text" placeholder="Sectietitel" value="${item.title || ""}">
      <textarea class="info-text" placeholder="Tekst">${item.text || ""}</textarea>
      <button class="remove-btn" type="button">X</button>
    `;
  }

  function fillDynamicList(containerId, list, templateFn) {
    const container = document.getElementById(containerId);
    container.innerHTML = "";
    (list || []).forEach(item => addDynamicItem(containerId, templateFn(item)));
  }

  function collectPriceOptions() {
    const items = priceOptionsContainer.querySelectorAll(".dynamic-item");
    const result = [];
    items.forEach(div => {
      const label = div.querySelector(".price-label")?.value.trim();
      const price = div.querySelector(".price-value")?.value.trim();
      if (label && price) result.push({ label, price });
    });
    return result;
  }

  function collectFormFields() {
    const items = formFieldsContainer.querySelectorAll(".dynamic-item");
    const result = [];
    items.forEach(div => {
      const label = div.querySelector(".field-label")?.value.trim();
      const type = div.querySelector(".field-type")?.value;
      if (label) result.push({ label, type });
    });
    return result;
  }

  function collectExtraInfo() {
    const items = extraInfoContainer.querySelectorAll(".dynamic-item");
    const result = [];
    items.forEach(div => {
      const title = div.querySelector(".info-title")?.value.trim();
      const text = div.querySelector(".info-text")?.value.trim();
      if (title && text) result.push({ title, text });
    });
    return result;
  }

  function resetEventPopup() {
    titleInput.value = "";
    introInput.value = "";
    mainImageInput.value = "";
    extraImagesInput.value = "";
    currentMainImage.style.display = "none";
    currentMainImage.src = "";
    existingExtraImages.innerHTML = "";

    externalLinkInput.value = "";
    externalLinkSection.style.display = "none";

    formSection.style.display = "none";
    paymentEnabledCheckbox.checked = false;
    paymentOptionsSection.style.display = "none";

    priceOptionsContainer.innerHTML = "";
    formFieldsContainer.innerHTML = "";
    extraInfoContainer.innerHTML = "";

    startDateInput.value = "";
    endDateInput.value = "";

    // default inscription method
    inscriptionRadios.forEach(r => r.checked = false);
  }

  function openEventPopupForAdd() {
    currentEventId = null;
    resetEventPopup();
    popupTitle.innerText = "Nieuw Event";
    // default to form
    const formRadio = document.querySelector("input[name='inscription-method'][value='form']");
    if (formRadio) {
      formRadio.checked = true;
      formSection.style.display = "block";
    }
    eventPopup.style.display = "flex";
  }

  async function openEventPopupForEdit(id) {
    currentEventId = id;
    resetEventPopup();

    const ref = doc(db, "events", id);
    const snap = await getDoc(ref);
    if (!snap.exists()) return;
    const data = snap.data();

    popupTitle.innerText = "Event bewerken";

    titleInput.value = data.title || "";
    introInput.value = data.intro || "";

    if (data.mainImage) {
      currentMainImage.src = data.mainImage;
      currentMainImage.style.display = "block";
    }

    existingExtraImages.innerHTML = "";
    (data.extraImages || []).forEach(url => {
      const div = document.createElement("div");
      div.className = "existing-image";
      div.innerHTML = `<img src="${url}" width="60">`;
      existingExtraImages.appendChild(div);
    });

    if (data.inscriptionMethod) {
      const radio = document.querySelector(`input[name='inscription-method'][value='${data.inscriptionMethod}']`);
      if (radio) radio.checked = true;
    }

    if (data.inscriptionMethod === "external") {
      externalLinkSection.style.display = "block";
      externalLinkInput.value = data.externalLink || "";
    }

    if (data.inscriptionMethod === "form") {
      formSection.style.display = "block";
      paymentEnabledCheckbox.checked = !!data.paymentEnabled;

      if (data.paymentEnabled) {
        paymentOptionsSection.style.display = "block";
        fillDynamicList("event-price-options", data.priceOptions, priceTemplate);
      }

      fillDynamicList("event-form-fields", data.formFields, fieldTemplate);
    }

    fillDynamicList("event-extra-info", data.extraInfo, infoTemplate);

    startDateInput.value = data.startDate || "";
    endDateInput.value = data.endDate || "";

    eventPopup.style.display = "flex";
  }

  async function saveNewEvent() {
    const title = titleInput.value.trim();
    const intro = introInput.value.trim();

    const mainFile = mainImageInput.files[0];
    const extraFiles = extraImagesInput.files;

    let mainImage = "";
    if (mainFile) {
      mainImage = await uploadImage(mainFile);
    }

    const extraImages = [];
    for (let f of extraFiles) {
      const url = await uploadImage(f);
      if (url) extraImages.push(url);
    }

    const inscriptionMethod = document.querySelector("input[name='inscription-method']:checked")?.value || "form";

    let externalLink = "";
    let paymentEnabled = false;
    let priceOptions = [];
    let formFields = [];

    if (inscriptionMethod === "external") {
      externalLink = externalLinkInput.value.trim();
    }

    if (inscriptionMethod === "form") {
      paymentEnabled = paymentEnabledCheckbox.checked;
      if (paymentEnabled) {
        priceOptions = collectPriceOptions();
      }
      formFields = collectFormFields();
    }

    const extraInfo = collectExtraInfo();

    const startDate = startDateInput.value || "";
    const endDate = endDateInput.value || "";

    await addDoc(eventsCol, {
      title,
      intro,
      mainImage,
      extraImages,
      inscriptionMethod,
      externalLink,
      paymentEnabled,
      priceOptions,
      formFields,
      extraInfo,
      startDate,
      endDate
    });
  }

  async function saveEditedEvent(id) {
    const ref = doc(db, "events", id);
    const snap = await getDoc(ref);
    if (!snap.exists()) return;
    const existing = snap.data();

    const title = titleInput.value.trim();
    const intro = introInput.value.trim();

    const mainFile = mainImageInput.files[0];
    const extraFiles = extraImagesInput.files;

    let mainImage = existing.mainImage || "";
    if (mainFile) {
      const url = await uploadImage(mainFile);
      if (url) mainImage = url;
    }

    const extraImages = Array.isArray(existing.extraImages) ? [...existing.extraImages] : [];
    for (let f of extraFiles) {
      const url = await uploadImage(f);
      if (url) extraImages.push(url);
    }

    const inscriptionMethod = document.querySelector("input[name='inscription-method']:checked")?.value || "form";

    let externalLink = "";
    let paymentEnabled = false;
    let priceOptions = [];
    let formFields = [];

    if (inscriptionMethod === "external") {
      externalLink = externalLinkInput.value.trim();
    }

    if (inscriptionMethod === "form") {
      paymentEnabled = paymentEnabledCheckbox.checked;
      if (paymentEnabled) {
        priceOptions = collectPriceOptions();
      }
      formFields = collectFormFields();
    }

    const extraInfo = collectExtraInfo();

    const startDate = startDateInput.value || "";
    const endDate = endDateInput.value || "";

    await updateDoc(ref, {
      title,
      intro,
      mainImage,
      extraImages,
      inscriptionMethod,
      externalLink,
      paymentEnabled,
      priceOptions,
      formFields,
      extraInfo,
      startDate,
      endDate
    });
  }

  async function loadEvents() {
    const snap = await getDocs(eventsCol);
    listHolder.innerHTML = "";

    snap.forEach(docSnap => {
      const data = docSnap.data();
      const id = docSnap.id;

      const item = document.createElement("div");
      item.className = "collection-items-basic flex-hor-spaced";
      item.innerHTML = `
        <div class="flexhorizontal" style="gap: 12px">
          <img loading="lazy" width="40" src="${data.mainImage || "/images/placeholder.jpg"}" alt="${data.title || ""}">
          <div class="bold-text">${data.title || ""}</div>
        </div>
        <div class="holderactionbtns">
          <button class="actionbtn edit-btn" data-id="${id}"><img src="/images/edit.svg"></button>
          <button class="actionbtn delete-btn" data-id="${id}"><img src="/images/delete.svg"></button>
        </div>
      `;
      listHolder.appendChild(item);
    });

    listHolder.querySelectorAll(".edit-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const id = e.currentTarget.dataset.id;
        openEventPopupForEdit(id);
      });
    });

    listHolder.querySelectorAll(".delete-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        currentDeleteEventId = e.currentTarget.dataset.id;
        deleteEventModal.style.display = "flex";
      });
    });
  }

  // ---------- Event listeners ----------

  addEventBtn?.addEventListener("click", openEventPopupForAdd);

  saveEventBtn.addEventListener("click", async () => {
    if (currentEventId === null) {
      await saveNewEvent();
    } else {
      await saveEditedEvent(currentEventId);
    }
    eventPopup.style.display = "none";
    await loadEvents();
  });

  function closeEventPopup() {
    eventPopup.style.display = "none";
  }

  closeEventBtn.addEventListener("click", closeEventPopup);
  closeEventBtnTop.addEventListener("click", closeEventPopup);

  inscriptionRadios.forEach(radio => {
    radio.addEventListener("change", () => {
      const value = radio.value;
      if (!radio.checked) return;

      if (value === "external") {
        externalLinkSection.style.display = "block";
        formSection.style.display = "none";
      } else if (value === "form") {
        externalLinkSection.style.display = "none";
        formSection.style.display = "block";
      }
    });
  });

  paymentEnabledCheckbox.addEventListener("change", () => {
    paymentOptionsSection.style.display = paymentEnabledCheckbox.checked ? "block" : "none";
  });

  addPriceOptionBtn.addEventListener("click", () => {
    addDynamicItem("event-price-options", priceTemplate());
  });

  addFormFieldBtn.addEventListener("click", () => {
    addDynamicItem("event-form-fields", fieldTemplate());
  });

  addExtraInfoBtn.addEventListener("click", () => {
    addDynamicItem("event-extra-info", infoTemplate());
  });

  deleteEventConfirmBtn.addEventListener("click", async () => {
    if (currentDeleteEventId) {
      await deleteDoc(doc(db, "events", currentDeleteEventId));
      currentDeleteEventId = null;
      await loadEvents();
    }
    deleteEventModal.style.display = "none";
  });

  closeDeleteEventModalBtn.addEventListener("click", () => {
    deleteEventModal.style.display = "none";
  });

  // ---------- Initial load ----------
  loadEvents();
</script>



</body>
