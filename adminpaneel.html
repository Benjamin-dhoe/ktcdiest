<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Adminpaneel</title>

  <link href="/css/normalize.css" rel="stylesheet" type="text/css">
  <link href="/css/webflow.css" rel="stylesheet" type="text/css">
  <link href="/css/ktc-diest.css" rel="stylesheet" type="text/css">
  <link href="/css/dashboard.css" rel="stylesheet" type="text/css">
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link
    href="https://fonts.gstatic.com"
    rel="preconnect"
    crossorigin="anonymous"
  />
  <script
    src="https://ajax.googleapis.com/ajax/libs/webfont/1.6.26/webfont.js"
    type="text/javascript"
  ></script>
  <script type="text/javascript">
    WebFont.load({ google: { families: ["Poppins:300,400,500,600,700"] } });
  </script>
  <script
    src="https://use.typekit.net/sxk2qjh.js"
    type="text/javascript"
  ></script>
  <script type="text/javascript">
    try {
      Typekit.load();
    } catch (e) {}
  </script>
  <script type="text/javascript">
    !(function (o, c) {
      var n = c.documentElement,
        t = " w-mod-";
      (n.className += t + "js"),
        ("ontouchstart" in o ||
          (o.DocumentTouch && c instanceof DocumentTouch)) &&
          (n.className += t + "touch");
    })(window, document);
  </script>
  <link href="/images/favicon.png" rel="shortcut icon" type="image/x-icon" />
  <link href="/images/webclip.png" rel="apple-touch-icon" />
  <script src="https://unpkg.com/@lottiefiles/lottie-player@1.5.7/dist/lottie-player.js"></script>
</head>
<body class="body-dashboard">
    <div class="holder-content">
      <div class="top-of-the-dashboard">
        <a href="/admin/home" class="logo-in-dashboard w-inline-block">
          <img class="logo-dashboard" src="/images/logo-ktcdiest.png" width="217" alt="" hash="Overzicht" id="Overzicht" loading="lazy">
          <div class="heading-dashboard">KTC Diest</div>
        </a>
        <lottie-player
          id="navLottie"
          class="navlottie"
          src="/images/hamburger-lottie-white.json"
          background="transparent"
          speed="1"
          >
        </lottie-player>
      </div>
      <div class="tabs">
        <div class="popup">
            <div class="innerpopup">
              <span id="order-details-popup-close" class="close-button w-button">X</span>
              <h3>Order Details</h3>
              <p><strong>Item:</strong> <span class="order-details-name"></span></p>
              <p><strong>Price:</strong> <span class="order-details-price"></span></p>
              <p><strong>Quantity:</strong> <span class="order-details-quantity"></span></p>
            </div>
        </div>
        
        <div id="tabmenu" class="tab-menu-dashboard w-tab-menu">
          <a href="/admin/coaches" class="dashboard-side-link w-inline-block w-tab-link">
            <div class="text-dashboard-link">Coaches</div>
          </a>
          <div class="tabs-content-dashboard">
            <div class="top-of-the-pane-dashboard">
            <h2 class="heading-dashboard">Coaches</h2>
            </div>
            <div id="delete-coach-modal" class="popuptraining">
                <div class="innerpopupdark">
                    <span id="close-delete-modal" class="close-button w-button">×</span>
                    <div>Zeker dat je deze coach wilt verwijderen?</div>
                    <button id="delete-confirm-button" class="save-button-dashboard insideform delete">Ja, verwijder</button>
                </div>
                </div>
            <div class="popuptraining" id="edit-coach-popup" style="display: none;">
            
            <form id="edit-coach-form" class="innerpopup">
                <button class="close-button w-button" id="closeEditBtn">X</button>
                <label>Voornaam Naam</label>
                <input class="rounded-select dark w-input" maxlength="256" type="text" id="edit-coachname" required="">
                <label>Afbeelding</label>
                <input type="file" id="edit-coachimageupload" style="width: 90%; padding-bottom: 20px;" accept="image/*">
                <div id="edit-coach-image-preview">
                <img id="current-coach-image" src="https://firebasestorage.googleapis.com/v0/b/robin-physical-coaching.firebasestorage.app/o/coaches%2Fcandice.png?alt=media&amp;token=099bfa0a-4fc6-41e3-bc38-d87e68dfd03e" alt="Current Coach Image" width="100">
                </div>
                <div class="spacer"></div>
                <div class="spacer"></div>
                <input type="submit" class="submit-button fullwidth w-button" value="Bijwerken">
            </form>
            </div>
            <div class="w-dyn-list">
              <div class="w-dyn-items" id="holdercoaches"></div>
            </div>
            <button class="submit-button w-button" id="add-coach-btn">+ coach toevoegen</button>
            <div style="display:none" id="add-coach-form">
                <div class="spacer"></div>
                <div class="spacer"></div>
                <label>Voornaam Naam</label>
                <input class="rounded-select w-input" maxlength="256" placeholder="" type="text" id="coachname">
                <label>Afbeelding</label>
                <input type="file" id="coachimageupload" style="width: 90%; padding-bottom: 20px;">
                <div class="spacer"></div>
                <button type="button" class="submit-button fullwidth w-button" id="submit-coach-btn">Coach toevoegen</button>
            </div>
        </div>
          <div class="spacer"></div>
          <button id="logoutBtn" class="button-log-out w-inline-block">
            <div class="html-icon-dashboard w-embed"><svg id="_3669343_exit_app_to_ic_icon" data-name="3669343_exit_app_to_ic_icon" xmlns="http://www.w3.org/2000/svg" width="25" height="25" viewbox="0 0 48 48">
                <path id="Path_10" data-name="Path 10" d="M0,0H48V48H0Z" fill="none"></path>
                <path id="Path_11" data-name="Path 11" d="M20.17,31.17,23,34,33,24,23,14l-2.83,2.83L25.34,22H6v4H25.34ZM38,6H10a4,4,0,0,0-4,4v8h4V10H38V38H10V30H6v8a4,4,0,0,0,4,4H38a4,4,0,0,0,4-4V10A4,4,0,0,0,38,6Z" fill="CurrentColor"></path>
              </svg></div>
            <div>Uitloggen</div>
          </button>
        </div>
        <div class="tabs-content-dashboard">
          <div class="top-of-the-pane-dashboard">
            <h2 class="heading-dashboard">Coaches</h2>
          </div>
          
        </div>
      </div>
      {{logouthtml}}
    </div>  
<script src="/js/dash.js" type="text/javascript"></script>
<script type="module">
    import { app } from "/js/firebase.js";
    import { createLoadingSpinner, showLoadingSpinner } from "/js/Spinner.js";
    import { getFirestore, collection, getDocs, getDoc, addDoc, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-storage.js";
    
    const db = getFirestore(app);
    const storage = getStorage(app);
    const listHolder = document.getElementById("holdercoaches");
    const addCoachForm = document.getElementById("add-coach-form");
    const editCoachForm = document.getElementById("edit-coach-popup");
    const closeDeleteModalButton = document.getElementById("close-delete-modal");
    const deleteCoachModal = document.getElementById("delete-coach-modal");
    const deleteConfirmButton = document.getElementById("delete-confirm-button");
    
    let currentDeleteDocId = null;
    const loadingSpinner = showLoadingSpinner(listHolder);
    
    // Load coaches from Firestore
    async function loadCoaches() {
      const querySnapshot = await getDocs(collection(db, "Coaches"));
      listHolder.innerHTML = "";
      querySnapshot.forEach((doc) => {
        const coachData = doc.data();
        const coachId = doc.id;
        const coachItem = document.createElement("div");
        coachItem.className = "collection-items-basic flex-hor-spaced";
        coachItem.innerHTML = `
          <div class="flexhorizontal">
            <div class="coachhold">
              <img loading="lazy" width="40" src="${coachData.imageUrl}" alt="${coachData.naam}">
            </div>
            <div class="bold-text">${coachData.naam}</div>
          </div>
          <div class="holderactionbtns">
              <button class="actionbtn edit-btn" data-id="${coachId}"><img src="/images/edit.svg"></button>
              <button class="actionbtn delete-btn" data-id="${coachId}"><img src="/images/delete.svg"></button>
          </div>
        `;
        listHolder.appendChild(coachItem);
      });
    
      // Attach click listeners to each edit button
      document.querySelectorAll(".edit-btn").forEach((button) => {
        button.addEventListener("click", openEditPopup);
      });
    
      document.querySelectorAll(".delete-btn").forEach((button) => {
        button.addEventListener("click", openDeleteModal);
      });
    }
    
    // Open the add coach form
    document.getElementById("add-coach-btn").addEventListener("click", () => {
      addCoachForm.style.display = "block";
      document.getElementById("coachname").value = "";
      document.getElementById("coachimageupload").value = "";
    });
    
    // Handle adding a new coach
    document.getElementById("submit-coach-btn").addEventListener("click", async (e) => {
      e.preventDefault();
      const name = document.getElementById("coachname").value;
      const imageFile = document.getElementById("coachimageupload").files[0];
      
      if (imageFile && imageFile.size <= 1048576) { // 1MB limit
        const imageUrl = await uploadImage(imageFile);
        await addDoc(collection(db, "Coaches"), { naam: name, imageUrl });
        addCoachForm.style.display = "none";
        loadCoaches(); // Reload coaches
      } else {
        document.getElementById("filelarge").style.display = "block";
      }
    });
    
    deleteConfirmButton.addEventListener("click", handleDelete);
    
    // Function to open the edit popup
    async function openEditPopup(event) {
      const button = event.target.closest("button[data-id]");
      const coachId = button.getAttribute("data-id");
    
      const coachRef = doc(db, "Coaches", coachId);
    
      try {
        const coachSnapshot = await getDoc(coachRef);
        if (coachSnapshot.exists()) {
          const coachData = coachSnapshot.data();
    
          // Populate form fields with current data
          document.getElementById("edit-coachname").value = coachData.naam;
    
          // Show current image in the preview
          document.getElementById("current-coach-image").src = coachData.imageUrl;
    
          // Set up the form submission event for updating the coach
          document.getElementById("edit-coach-form").onsubmit = (e) => handleEditCoach(e, coachId);
    
          // Display the edit form
          editCoachForm.style.display = "flex";
        } else {
          console.error("No such coach document!");
        }
      } catch (error) {
        console.error("Error opening edit popup:", error);
      }
    }
    
    // Handle editing a coach
    async function handleEditCoach(e, coachId) {
      e.preventDefault();
      const name = document.getElementById("edit-coachname").value;
      const imageFile = document.getElementById("edit-coachimageupload").files[0];
      let imageUrl;
    
      if (imageFile && imageFile.size <= 1048576) { // 1MB limit
        imageUrl = await uploadImage(imageFile);
      }
    
      const coachRef = doc(db, "Coaches", coachId);
      const updatedData = { naam: name };
      if (imageUrl) updatedData.imageUrl = imageUrl;
    
      await updateDoc(coachRef, updatedData);
      editCoachForm.style.display = "none";
      loadCoaches(); // Reload coaches
    }
    
    // Upload image to Firebase Storage and return URL
    async function uploadImage(file) {
      const MAX_FILE_SIZE = 1048576; // 1MB in bytes
      const previewImage = document.getElementById("current-coach-image");
      const fileError = document.getElementById("filelarge");
    
      // Check if file size exceeds 1MB
      if (file.size > MAX_FILE_SIZE) {
        fileError.style.display = "block"; // Show error message
        setTimeout(() => {
          fileError.style.display = "none";
        }, 10000);
        return null; // Return null to indicate upload failure
      } else {
        fileError.style.display = "none"; // Hide error message if size is valid
        previewImage.src = "";
      }
    
      try {
        const storageRef = ref(storage, 'coaches/' + file.name);
        await uploadBytes(storageRef, file); // Upload file
        return await getDownloadURL(storageRef); // Get URL of uploaded file
      } catch (error) {
        console.error("File upload error:", error);
        return null;
      }
    }
    
    function openDeleteModal(event) {
      const docId = event.target.closest("button").dataset.id;
      currentDeleteDocId = docId;
      deleteCoachModal.style.display = "flex";
    }
    
    async function handleDelete() {
      if (currentDeleteDocId) {
        const coachRef = doc(db, "Coaches", currentDeleteDocId);
        await deleteDoc(coachRef);
        loadCoaches();
      }
      deleteCoachModal.style.display = "none";
    }
    
    
    // Initial load of coaches
    loadCoaches();
    document.getElementById("closeEditBtn").addEventListener("click", function() {
      editCoachForm.style.display = "none";
    });
    
    closeDeleteModalButton.addEventListener("click", function() {
      deleteCoachModal.style.display = "none";
    });
</script>
</body>
</html>
