<body class="body-dashboard">

          <div class="tabs-content-dashboard">
            <div class="top-of-the-pane-dashboard">
            <h2 class="heading-dashboard">Coaches</h2>
            </div>

<button id="add-coach-btn" class="primary-btn" style="margin-top:20px;">Coach toevoegen</button>

<!-- ADD COACH POPUP -->
<div id="add-coach-form" class="popup">
  <div class="popup-content">
    <button class="popup-close-btn" onclick="document.getElementById('add-coach-form').style.display='none'">✕</button>
    <h2>Coach toevoegen</h2>

    <label>Naam</label>
    <input type="text" id="coachname">

    <label>Samenvatting</label>
    <textarea id="coachsummary"></textarea>

    <label>Foto uploaden</label>
    <input type="file" id="coachimageupload" accept="image/*">

    <div id="filelarge" class="error">Bestand is te groot (max 1MB)</div>

    <div class="achievements-header">
      <h3>Achievements</h3>
      <button id="add-achievement-btn" class="circle-add-btn">+</button>
    </div>
    <div id="add-achievements-list"></div>

    <div class="popup-actions">
      <button id="submit-coach-btn" class="primary-btn">Opslaan</button>
      <button class="close-btn" onclick="document.getElementById('add-coach-form').style.display='none'">Annuleren</button>
    </div>
  </div>
</div>

<!-- EDIT COACH POPUP -->
<div id="edit-coach-popup" class="popup">
  <div class="popup-content">
    <button class="popup-close-btn" id="closeEditBtnTop">✕</button>
    <h2>Coach bewerken</h2>

    <label>Naam</label>
    <input type="text" id="edit-coachname">

    <label>Intro text</label>
    <textarea id="edit-coachsummary"></textarea>

    <label>Huidige foto</label>
    <img id="current-coach-image" class="preview-img">

    <label>Nieuwe foto uploaden</label>
    <input type="file" id="edit-coachimageupload" accept="image/*">

    <div class="achievements-header">
      <h3>Prestaties</h3>
      <button id="edit-add-achievement-btn" class="circle-add-btn">+</button>
    </div>
    <div id="edit-achievements-list"></div>

    <div class="popup-actions">
      <button id="save-edit-btn" class="primary-btn">Opslaan</button>
      <button id="closeEditBtn" class="close-btn">Sluiten</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRMATION -->
<div id="delete-coach-modal" class="popup">
  <div class="popup-content small">
    <button class="popup-close-btn" id="close-delete-modal-top">✕</button>
    <h3>Coach verwijderen?</h3>
    <p>Deze actie kan niet ongedaan worden gemaakt.</p>

    <div class="popup-actions">
      <button id="delete-confirm-button" class="danger-btn">Verwijderen</button>
      <button id="close-delete-modal" class="close-btn">Annuleren</button>
    </div>
  </div>
</div>

<script src="/js/dash.js" type="text/javascript"></script>
<script type="module">
  import { app } from "/js/firebase.js";
  import { createLoadingSpinner, showLoadingSpinner } from "/js/Spinner.js";
  import { 
    getFirestore, collection, getDocs, getDoc, addDoc, updateDoc, doc, deleteDoc 
  } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";
  import { 
    getStorage, ref, uploadBytes, getDownloadURL 
  } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-storage.js";
  
  const db = getFirestore(app);
  const storage = getStorage(app);
  const listHolder = document.getElementById("holdercoaches");
  const addCoachForm = document.getElementById("add-coach-form");
  const editCoachForm = document.getElementById("edit-coach-popup");
  const closeDeleteModalButton = document.getElementById("close-delete-modal");
  const deleteCoachModal = document.getElementById("delete-coach-modal");
  const deleteConfirmButton = document.getElementById("delete-confirm-button");
  
  let currentDeleteDocId = null;
  const loadingSpinner = showLoadingSpinner(listHolder);

  // Helper: achievement toevoegen
  function addAchievement(containerId, value = "") {
    const container = document.getElementById(containerId);
    const div = document.createElement("div");
    div.className = "achievement-item";
    div.innerHTML = `
      <input type="text" value="${value ? value.replace(/"/g, "&quot;") : ""}" placeholder="Achievement">
      <button class="remove-ach-btn" type="button">X</button>
    `;
    container.appendChild(div);

    div.querySelector(".remove-ach-btn").addEventListener("click", () => {
      div.remove();
    });
  }

  // Load coaches from Firestore
  async function loadCoaches() {
    const querySnapshot = await getDocs(collection(db, "coaches"));
    listHolder.innerHTML = "";
    querySnapshot.forEach((docSnap) => {
      const coachData = docSnap.data();
      const coachId = docSnap.id;
      const coachItem = document.createElement("div");
      coachItem.className = "collection-items-basic flex-hor-spaced";
      coachItem.innerHTML = `
        <div class="flexhorizontal" style="gap: 12px">
          <div class="coachhold">
            <img loading="lazy" width="40" src="${coachData.imageUrl || "/images/placeholder.jpg"}" alt="${coachData.name}">
          </div>
          <div class="bold-text">${coachData.name}</div>
        </div>
        <div class="holderactionbtns">
            <button class="actionbtn edit-btn" data-id="${coachId}"><img src="/images/edit.svg"></button>
            <button class="actionbtn delete-btn" data-id="${coachId}"><img src="/images/delete.svg"></button>
        </div>
      `;
      listHolder.appendChild(coachItem);
    });

    document.querySelectorAll(".edit-btn").forEach((button) => {
      button.addEventListener("click", openEditPopup);
    });

    document.querySelectorAll(".delete-btn").forEach((button) => {
      button.addEventListener("click", openDeleteModal);
    });
  }

  // Open the add coach form
  document.getElementById("add-coach-btn").addEventListener("click", () => {
    addCoachForm.style.display = "flex";
    document.getElementById("coachname").value = "";
    document.getElementById("coachsummary").value = "";
    document.getElementById("coachimageupload").value = "";
    document.getElementById("add-achievements-list").innerHTML = "";
  });

  // Achievements knoppen
  document.getElementById("add-achievement-btn").addEventListener("click", () => {
    addAchievement("add-achievements-list");
  });

  document.getElementById("edit-add-achievement-btn").addEventListener("click", () => {
    addAchievement("edit-achievements-list");
  });

  // Handle adding a new coach
  document.getElementById("submit-coach-btn").addEventListener("click", async (e) => {
    e.preventDefault();
    const name = document.getElementById("coachname").value;
    const intro = document.getElementById("coachsummary").value;
    const imageFile = document.getElementById("coachimageupload").files[0];

    // achievements ophalen
    const achievementsInputs = document.querySelectorAll("#add-achievements-list .achievement-item input");
    const achievements = Array.from(achievementsInputs)
      .map(i => i.value.trim())
      .filter(v => v.length > 0);

    let imageUrl = "";
    if (imageFile) {
      imageUrl = await uploadImage(imageFile);
      if (!imageUrl) return; // upload faalde
    }

    await addDoc(collection(db, "coaches"), { 
      name: name, 
      intro,
      imageUrl,
      achievements
    });

    addCoachForm.style.display = "none";
    loadCoaches();
  });

  deleteConfirmButton.addEventListener("click", handleDelete);

  // Function to open the edit popup
  async function openEditPopup(event) {
    const button = event.target.closest("button[data-id]");
    const coachId = button.getAttribute("data-id");

    const coachRef = doc(db, "coaches", coachId);

    try {
      const coachSnapshot = await getDoc(coachRef);
      if (coachSnapshot.exists()) {
        const coachData = coachSnapshot.data();

        document.getElementById("edit-coachname").value = coachData.name || "";
        document.getElementById("edit-coachsummary").value = coachData.intro || "";
        document.getElementById("current-coach-image").src = coachData.imageUrl || "";

        // achievements vullen
        const editContainer = document.getElementById("edit-achievements-list");
        editContainer.innerHTML = "";
        (coachData.achievements || []).forEach(a => addAchievement("edit-achievements-list", a));

        // Save button koppelen
        document.getElementById("save-edit-btn").onclick = (e) => handleEditCoach(e, coachId);

        editCoachForm.style.display = "flex";
      } else {
        console.error("No such coach document!");
      }
    } catch (error) {
      console.error("Error opening edit popup:", error);
    }
  }

  // Handle editing a coach
  async function handleEditCoach(e, coachId) {
    e.preventDefault();
    const name = document.getElementById("edit-coachname").value;
    const intro = document.getElementById("edit-coachsummary").value;
    const imageFile = document.getElementById("edit-coachimageupload").files[0];
    let imageUrl;

    if (imageFile) {
      imageUrl = await uploadImage(imageFile);
      if (!imageUrl) return;
    }

    // achievements ophalen
    const achievementsInputs = document.querySelectorAll("#edit-achievements-list .achievement-item input");
    const achievements = Array.from(achievementsInputs)
      .map(i => i.value.trim())
      .filter(v => v.length > 0);

    const coachRef = doc(db, "coaches", coachId);
    const updatedData = { 
      name: name,
      intro,
      achievements
    };
    if (imageUrl) updatedData.imageUrl = imageUrl;

    await updateDoc(coachRef, updatedData);
    editCoachForm.style.display = "none";
    loadCoaches();
  }

  // Upload image to Firebase Storage and return URL
  async function uploadImage(file) {
    const MAX_FILE_SIZE = 1048576; // 1MB
    const fileError = document.getElementById("filelarge");

    if (file.size > MAX_FILE_SIZE) {
      fileError.style.display = "block";
      setTimeout(() => {
        fileError.style.display = "none";
      }, 10000);
      return null;
    } else {
      fileError.style.display = "none";
    }

    try {
      const storageRef = ref(storage, 'coaches/' + file.name);
      await uploadBytes(storageRef, file);
      return await getDownloadURL(storageRef);
    } catch (error) {
      console.error("File upload error:", error);
      return null;
    }
  }

  function openDeleteModal(event) {
    const docId = event.target.closest("button").dataset.id;
    currentDeleteDocId = docId;
    deleteCoachModal.style.display = "flex";
  }

  async function handleDelete() {
    if (currentDeleteDocId) {
      const coachRef = doc(db, "coaches", currentDeleteDocId);
      await deleteDoc(coachRef);
      loadCoaches();
    }
    deleteCoachModal.style.display = "none";
  }

  // Initial load of coaches
  loadCoaches();

  // Close buttons
  document.getElementById("closeEditBtn").addEventListener("click", function() {
    editCoachForm.style.display = "none";
  });

  document.getElementById("closeEditBtnTop").addEventListener("click", function() {
    editCoachForm.style.display = "none";
  });

  closeDeleteModalButton.addEventListener("click", function() {
    deleteCoachModal.style.display = "none";
  });

  document.getElementById("close-delete-modal-top").addEventListener("click", function() {
    deleteCoachModal.style.display = "none";
  });
</script>

</body>
</html>
